name: Terraform Test

on:
  workflow_dispatch:   # allows manual run from UI
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug - Show files
        run: ls -R

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform   # 🔴 IMPORTANT

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform   # 🔴 IMPORTANT
